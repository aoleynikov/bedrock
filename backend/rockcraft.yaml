name: bedrock-backend
base: ubuntu@22.04
build-base: ubuntu@22.04
version: "0.1"
summary: Bedrock FastAPI backend
description: |
  Production FastAPI backend for the Bedrock platform.
  Exposes the REST API on port 8000 via uvicorn.

  Build:
    rockcraft pack
    rockcraft.skopeo copy oci-archive:bedrock-backend_0.1_amd64.rock \
      docker-daemon:bedrock-backend:latest

platforms:
  amd64:

parts:
  python-deps:
    plugin: python
    source: .
    python-requirements:
      - requirements.txt
    build-packages:
      - gcc
      - python3-dev
      - libffi-dev
      - libssl-dev
      - libjpeg-dev
      - zlib1g-dev
    stage-packages:
      - python3
      - python3-distutils
      - libffi8
      - libssl3
      - libjpeg8
      - zlib1g

  app-code:
    plugin: dump
    source: .
    organize:
      "src/": "app/src/"
    stage:
      - app/src/

services:
  backend:
    override: replace
    command: python3 -m uvicorn src.main:app --host 0.0.0.0 --port 8000
    startup: enabled
    working-dir: /app
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
