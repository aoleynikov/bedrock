name: bedrock-backend-tests
base: ubuntu@22.04
build-base: ubuntu@22.04
version: "0.1"
summary: Bedrock backend test runner
description: |
  OCI image for running the Bedrock backend test suite.
  Pebble is not used as the entrypoint; run pytest directly via --entrypoint.

  Build:
    rockcraft pack --rockfile rockcraft.tests.yaml
    rockcraft.skopeo copy oci-archive:bedrock-backend-tests_0.1_amd64.rock \
      docker-daemon:bedrock-backend-tests:latest

  Unit tests (no external services needed):
    docker run --rm \
      --entrypoint python3 \
      bedrock-backend-tests:latest \
      -m pytest tests/unit -m unit -v --strict-markers --tb=short \
               --asyncio-mode=auto --cov=src --cov-report=term-missing -o addopts=

  Integration tests (requires MongoDB on the same Docker network):
    docker run --rm \
      --entrypoint python3 \
      --network <mongodb-network> \
      --env-file env.local \
      -e ENV=test \
      bedrock-backend-tests:latest \
      -m pytest tests/integration -m integration -v --strict-markers --tb=short \
               --asyncio-mode=auto --cov=src --cov-report=term-missing -o addopts=

  See scripts/run_unit_tests_docker.sh and scripts/run_integration_tests_docker.sh
  for the full orchestration logic.

platforms:
  amd64:

parts:
  python-deps:
    plugin: python
    source: .
    python-requirements:
      - requirements.txt
    build-packages:
      - gcc
      - python3-dev
      - libffi-dev
      - libssl-dev
      - libjpeg-dev
      - zlib1g-dev
    stage-packages:
      - python3
      - python3-distutils
      - libffi8
      - libssl3
      - libjpeg8
      - zlib1g

  app-code:
    plugin: dump
    source: .
    organize:
      "src/": "app/src/"
      "tests/": "app/tests/"
      "pytest.ini": "app/pytest.ini"
    stage:
      - app/src/
      - app/tests/
      - app/pytest.ini

  # Integration tests write files here (e.g. upload fixtures).
  storage-dir:
    plugin: nil
    override-build: |
      mkdir -p "$CRAFT_PART_INSTALL/app/storage"
