apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://host.docker.internal:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        - name: 'All logs by correlation'
          matcherType: label
          matcherRegex: correlation_id
          url: '/d/bedrock-logs-correlation?var-correlation_id=$${__value.raw}'
        - name: 'All logs by correlation'
          matcherType: regex
          matcherRegex: '([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})'
          url: '/d/bedrock-logs-correlation?var-correlation_id=$${__value.raw}'
