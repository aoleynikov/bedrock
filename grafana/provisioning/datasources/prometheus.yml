apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://host.docker.internal:3100
    isDefault: false
    editable: true
    jsonData:
      derivedFields:
        - name: 'Filter by correlation ID'
          matcherType: label
          matcherRegex: correlation_id
          url: '/d/bedrock-logs?var-correlation_id=$${__value.raw}'
